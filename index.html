<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(102, 252, 241, 0.1);
            text-align: center;
            border: 1px solid rgba(102, 252, 241, 0.1);
            margin: 20px;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: rgba(102, 252, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .icon svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 32px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--accent-color);
            color: #0b0c10;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.98);
            background-color: var(--accent-hover);
        }

        .status-container {
            height: 24px;
            margin-top: 24px;
        }

        .loading-text {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(102, 252, 241, 0.3);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulse animation for the glowing container */
        @keyframes pulseGlow {
            0% { box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(102, 252, 241, 0.1); }
            50% { box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 30px rgba(102, 252, 241, 0.2); }
            100% { box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(102, 252, 241, 0.1); }
        }

        .container {
            animation: pulseGlow 4s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>
        
        <h1>AI Image Engine</h1>
        <p>Unrestricted access. Generate custom scenarios instantly. 18+ content warning.</p>
        
        <a href="https://seduced.com?ref=A234" class="btn" id="manualBtn">Enter AI Engine</a>
        
        <div class="status-container">
            <div class="loading-text" id="loadingState">
                <div class="spinner"></div>
                Redirecting to secure gateway...
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var targetUrl = "https://seduced.com?ref=A234";
            
            // Comprehensive bot detection regex
            var botPattern = /bot|crawler|spider|crawling|facebookexternalhit|vkShare|Twitterbot|Slackbot|WhatsApp|TelegramBot|Discordbot|Googlebot/i;
            var userAgent = navigator.userAgent;
            var isBot = botPattern.test(userAgent);

            // Execute redirect logic only for real users
            if (!isBot) {
                var loadingEl = document.getElementById('loadingState');
                var manualBtn = document.getElementById('manualBtn');
                
                // Show loading animation
                loadingEl.style.opacity = '1';
                
                // Disable button text temporarily to show automated process
                manualBtn.style.opacity = '0.7';
                manualBtn.style.pointerEvents = 'none';
                manualBtn.innerText = 'Connecting...';

                // Redirect after 1.5 seconds
                setTimeout(function() {
                    window.location.replace(targetUrl);
                }, 1500);
            }
        });
    </script>
</body>
</html>
